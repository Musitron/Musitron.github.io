  span[lang="es"] { display: inline !important; }

  body.lang-en [lang="es"] { display: none !important; }
  body.lang-en [lang="en"] { display: block !important; }
  body.lang-en span[lang="es"] { display: none !important; }
  body.lang-en span[lang="en"] { display: inline !important; }
